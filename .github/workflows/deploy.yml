name: Build and Push Docker Image

on:
  push:
    branches: ['master']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- PHẦN BACKEND ---
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      # --- PHẦN FRONTEND ---
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      # --- THIẾT LẬP KẾT NỐI K8S ---
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # --- DEPLOY ---
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k k8s --validate=false

          kubectl rollout restart deployment backend-deployment
          kubectl rollout restart deployment frontend-deployment

          kubectl rollout status deployment backend-deployment
          kubectl rollout status deployment frontend-deployment
