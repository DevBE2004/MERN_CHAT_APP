name: Build and Deploy to Kubernetes

on:
  push:
    branches: ['master']

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. BUILD & PUSH BACKEND
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      # 3. BUILD & PUSH FRONTEND
      - name: Build and Push Frontend
        run: |
          docker build --build-arg VITE_API_URL=http://localhost:32000 -t ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      # 4. THIẾT LẬP KUBERNETES CONTEXT
      # Đảm bảo Secret KUBE_CONFIG đã được lấy bằng lệnh: kubectl config view --raw
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 5. CẬP NHẬT IMAGE TAG TRONG KUSTOMIZE
      # Sử dụng lệnh thay thế chuỗi trực tiếp bằng PowerShell để tránh lỗi 'kustomize not found'
      - name: Update image tag
        shell: powershell
        run: |
          cd k8s
          $backendImg = "${{ secrets.DOCKER_USERNAME }}/chat-backend:latest"
          $frontendImg = "${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest"

          # Cập nhật file kustomization.yaml trực tiếp
          (Get-Content kustomization.yaml) -replace 'newName: .*chat-backend', "newName: ${{ secrets.DOCKER_USERNAME }}/chat-backend" | Set-Content kustomization.yaml
          (Get-Content kustomization.yaml) -replace 'newName: .*chat-frontend', "newName: ${{ secrets.DOCKER_USERNAME }}/chat-frontend" | Set-Content kustomization.yaml

      # 6. DEPLOY LÊN CLUSTER (Minikube / Docker Desktop)
      - name: Deploy
        run: |
          kubectl apply -k k8s --validate=false

          kubectl rollout restart deployment backend-deployment
          kubectl rollout status deployment backend-deployment

          kubectl rollout restart deployment frontend-deployment
          kubectl rollout status deployment frontend-deployment
