name: Build and Deploy to Kubernetes

on:
  push:
    branches: ['master']

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. BUILD & PUSH BACKEND
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      # 3. BUILD & PUSH FRONTEND
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      # 4. THIẾT LẬP KUBERNETES CONTEXT
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 5. CẬP NHẬT IMAGE TAG TRONG KUSTOMIZE
      # Lưu ý: Đảm bảo máy đã cài kustomize hoặc dùng lệnh thay thế
      - name: Update image tag
        run: |
          cd k8s
          kustomize edit set image leanhtu23131/chat-backend=${{ secrets.DOCKER_USERNAME }}/chat-backend:latest
          kustomize edit set image leanhtu23131/chat-frontend=${{ secrets.DOCKER_USERNAME }}/chat-frontend:latest

      # 6. DEPLOY LÊN CLUSTER
      - name: Deploy
        run: |
          kubectl apply -k k8s --validate=false
          kubectl rollout status deployment backend-deployment
          kubectl rollout status deployment frontend-deployment
